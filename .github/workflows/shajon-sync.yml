name: SHAJON Sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JSON
        run: |
          curl -L \
          "https://raw.githubusercontent.com/SHAJON-404/iptv-playlist/refs/heads/main/channel_data/all_sports_channel.json" \
          -o sports.json

      - name: Update IPTV
        run: |
          python3 << 'PY'
          from pathlib import Path
          import json
          import re

          IPTV_FILE = Path("IPtv")

          if not IPTV_FILE.exists():
              IPTV_FILE.write_text("#EXTM3U\n", encoding="utf-8")

          text = IPTV_FILE.read_text(encoding="utf-8")

          data = json.loads(
              Path("sports.json").read_text(
                  encoding="utf-8"
              )
          )

          BEGIN_PERM = "# --- BEGIN SHAJON PERMANENT ---"
          END_PERM   = "# --- END SHAJON PERMANENT ---"

          BEGIN_LIVE = "# --- BEGIN SHAJON LIVE ---"
          END_LIVE   = "# --- END SHAJON LIVE ---"

          text = re.sub(
              r"\n?# --- BEGIN SHAJON PERMANENT ---.*?# --- END SHAJON PERMANENT ---",
              "",
              text,
              flags=re.S
          )

          text = re.sub(
              r"\n?# --- BEGIN SHAJON LIVE ---.*?# --- END SHAJON LIVE ---",
              "",
              text,
              flags=re.S
          )

          permanent = []
          live = []

          seen = set()

          for item in data:

              name = str(item.get("name", "")).strip()
              url = str(item.get("url", "")).strip()

              if not name or not url:
                  continue

              if url in seen:
                  continue

              seen.add(url)

              entry = (
                  f'#EXTINF:-1 tvg-name="{name}" '
                  f'group-title="Group Viva",{name}\n'
                  f'{url}'
              )

              upper = name.upper()

              is_live = (
                  upper.startswith("LIVE")
                  or upper.startswith("SD LIVE")
              )

              if is_live:
                  live.append(entry)
              else:
                  permanent.append(entry)

          block_perm = (
              "\n\n"
              + BEGIN_PERM
              + "\n"
              + "\n\n".join(permanent)
              + "\n"
              + END_PERM
          )

          block_live = (
              "\n\n"
              + BEGIN_LIVE
              + "\n"
              + "\n\n".join(live)
              + "\n"
              + END_LIVE
          )

          text = text.rstrip()

          text += block_perm
          text += block_live
          text += "\n"

          IPTV_FILE.write_text(
              text,
              encoding="utf-8"
          )
          PY

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add IPtv

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update SHAJON channels"
          git push
