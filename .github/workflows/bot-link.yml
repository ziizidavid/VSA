name: Sync IPTV

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SHAJON
        run: |
          curl -fsSL "https://raw.githubusercontent.com/SHAJON-404/iptv-playlist/refs/heads/main/channel_data/all_sports_channel.json" -o sports.json || true

      - name: Download DOMS
        run: |
          curl -fsSL "https://raw.githubusercontent.com/doms9/iptv/refs/heads/default/M3U8/events.m3u8" -o events.m3u8 || true

      - name: Build IPTV
        run: |
          python3 << 'PY'
          from pathlib import Path
          import json,re,urllib.request

          IPTV = Path("IPtv")

          if not IPTV.exists():
              IPTV.write_text("#EXTM3U\n", encoding="utf-8")

          text = IPTV.read_text(
              encoding="utf-8",
              errors="ignore"
          )

          # =========================
          # FWC FOX AUTO FALLBACK
          # =========================

          candidates = [
              "https://fifaworldcup.cfd/api/stream?q=4k",
              "https://fifaworldcup.cfd/api/stream?q=english",
              "https://fifaworldcup.cfd/api/stream?q=football"
          ]

          active_fwc = candidates[0]

          for url in candidates:
              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent":"Mozilla/5.0"
                      }
                  )

                  with urllib.request.urlopen(req, timeout=15) as r:
                      body = r.read(4096).decode(
                          "utf-8",
                          errors="ignore"
                      )

                  if (
                      "#EXTM3U" in body
                      or "#EXTINF" in body
                      or ".m3u8" in body
                  ):
                      active_fwc = url
                      break

              except:
                  pass

          text = re.sub(
              r'(#EXTINF:-1[^\n]*FWC FOx 4k[^\n]*\n)(https://[^\n]+)',
              r'\1' + active_fwc,
              text,
              flags=re.I
          )

          # =========================
          # REMOVE OLD BLOCKS
          # =========================

          blocks = [
              (
                  "# --- BEGIN SHAJON ALTERNATIF ---",
                  "# --- END SHAJON ALTERNATIF ---"
              ),
              (
                  "# --- BEGIN SHAJON LIVE ---",
                  "# --- END SHAJON LIVE ---"
              ),
              (
                  "# --- BEGIN DOMS EVENT ---",
                  "# --- END DOMS EVENT ---"
              )
          ]

          for begin,end in blocks:
              text = re.sub(
                  rf"\n?{re.escape(begin)}.*?{re.escape(end)}",
                  "",
                  text,
                  flags=re.S
              )

          alternatif = []
          live = []

          # =========================
          # SHAJON
          # =========================

          if Path("sports.json").exists():

              try:
                  data = json.loads(
                      Path("sports.json").read_text(
                          encoding="utf-8"
                      )
                  )

                  seen = set()

                  for item in data:

                      name = str(
                          item.get("name","")
                      ).strip()

                      url = str(
                          item.get("url","")
                      ).strip()

                      if not name or not url:
                          continue

                      if url in seen:
                          continue

                      seen.add(url)

                      upper = name.upper()

                      if (
                          upper.startswith("LIVE")
                          or upper.startswith("SD LIVE")
                      ):

                          row = (
                              f'#EXTINF:-1 tvg-name="{name}" '
                              f'group-title="Group Event",{name}\n'
                              f'{url}'
                          )

                          live.append(row)

                      else:

                          row = (
                              f'#EXTINF:-1 tvg-name="{name}" '
                              f'group-title="Group Alternatif",{name}\n'
                              f'{url}'
                          )

                          alternatif.append(row)

              except Exception as e:
                  print(e)

          # =========================
          # DOMS
          # =========================

          doms = ""

          if Path("events.m3u8").exists():

              try:

                  doms = Path(
                      "events.m3u8"
                  ).read_text(
                      encoding="utf-8",
                      errors="ignore"
                  )

                  doms = re.sub(
                      r'group-title="[^"]*"',
                      'group-title="Group Event"',
                      doms
                  )

              except Exception as e:
                  print(e)

          # =========================
          # APPEND BLOCKS
          # =========================

          text = text.rstrip()

          text += (
              "\n\n# --- BEGIN SHAJON ALTERNATIF ---\n"
              + "\n\n".join(alternatif)
              + "\n# --- END SHAJON ALTERNATIF ---"
          )

          text += (
              "\n\n# --- BEGIN SHAJON LIVE ---\n"
              + "\n\n".join(live)
              + "\n# --- END SHAJON LIVE ---"
          )

          text += (
              "\n\n# --- BEGIN DOMS EVENT ---\n"
              + doms.strip()
              + "\n# --- END DOMS EVENT ---\n"
          )

          IPTV.write_text(
              text,
              encoding="utf-8"
          )

          PY

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add IPtv

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto sync IPTV"
          git push
