name: Sync IPTV playlist (preserve up to WC2026 2; soccer-only)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-iptv
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream playlist and sports JSON
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/doms9/iptv/refs/heads/default/M3U8/events.m3u8" -o /tmp/events.m3u8 || true
          curl -fsSL "https://raw.githubusercontent.com/SHAJON-404/iptv-playlist/refs/heads/main/channel_data/all_sports_channel.json" -o /tmp/all_sports_channel.json || true
          [ -f /tmp/events.m3u8 ] && tr -d '\r' < /tmp/events.m3u8 > /tmp/events.normalized

      - name: Update playlist
        run: |
          python3 << 'PY'
          from pathlib import Path
          import json,re
          local=Path('IPtv')
          text=local.read_text(encoding='utf-8') if local.exists() else '#EXTM3U\n'
          original=text
          if Path('/tmp/all_sports_channel.json').exists():
              try:
                  data=json.loads(Path('/tmp/all_sports_channel.json').read_text())
                  urls=set(re.findall(r'https?://[^\s\"]+', text))
                  add=[]
                  for item in data if isinstance(data,list) else []:
                      url=item.get('channel_url') or item.get('url') or item.get('m3u8')
                      name=item.get('channel_name') or item.get('name') or 'Sports'
                      if url and url not in urls:
                          add.append(f'#EXTINF:-1 group-title="Group Viva",{name}\n{url}')
                          urls.add(url)
                  if add:
                      text += '\n' + '\n'.join(add) + '\n'
              except Exception:
                  pass
          if text!=original:
              local.write_text(text,encoding='utf-8')
          PY

      - name: Commit and push
        run: |
          if git status --porcelain | grep -q "IPtv"; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add IPtv
            git commit -m "Update sports json channels"
            git push
          fi