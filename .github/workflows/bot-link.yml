name: Sync IPTV

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download DOMS Event Playlist
        run: |
          curl -fsSL \
          "https://raw.githubusercontent.com/doms9/iptv/refs/heads/default/M3U8/events.m3u8" \
          -o events.m3u8 || true

      - name: Download World Cup Playlist
        run: |
          curl -fsSL \
          "https://raw.githubusercontent.com/HeruAje23/IPTV-VOUCHER/refs/heads/master/IPTV2026.m3u" \
          -o wc2026.m3u || true

      - name: Validate embed.json
        run: |
          python3 << 'PY'
          import json

          with open("embed.json","r",encoding="utf-8") as f:
              json.load(f)

          print("embed.json OK")
          PY

      - name: Build IPTV & Channels
        run: |
          python3 << 'PY'
          from pathlib import Path
          import json
          import re

          IPTV = Path("IPtv")

          if not IPTV.exists():
              IPTV.write_text("#EXTM3U\n", encoding="utf-8")

          text = IPTV.read_text(
              encoding="utf-8",
              errors="ignore"
          )

          # ==========================
          # REMOVE OLD AUTO BLOCKS
          # ==========================

          blocks = [
              (
                  "# --- BEGIN DOMS EVENT ---",
                  "# --- END DOMS EVENT ---"
              ),
              (
                  "# --- BEGIN ALTERNATIF HD ---",
                  "# --- END ALTERNATIF HD ---"
              )
          ]

          for begin, end in blocks:

              text = re.sub(
                  rf"\n?{re.escape(begin)}.*?{re.escape(end)}",
                  "",
                  text,
                  flags=re.S
              )

          # ==========================
          # DOMS EVENT
          # ==========================

          doms = ""

          if Path("events.m3u8").exists():

              doms = Path(
                  "events.m3u8"
              ).read_text(
                  encoding="utf-8",
                  errors="ignore"
              )

              doms = doms.replace(
                  "#EXTM3U",
                  ""
              )

              doms = re.sub(
                  r'group-title="[^"]*"',
                  'group-title="Group Event"',
                  doms
              )

          # ==========================
          # WORLD CUP
          # ==========================

          wc2026 = []

          if Path("wc2026.m3u").exists():

              lines = Path(
                  "wc2026.m3u"
              ).read_text(
                  encoding="utf-8",
                  errors="ignore"
              ).splitlines()

              inside = False

              for i, line in enumerate(lines):

                  if "#WORLD CUP 2026#" in line.upper():
                      inside = True
                      continue

                  if not inside:
                      continue

                  if not line.startswith("#EXTINF"):
                      continue

                  if i + 1 >= len(lines):
                      continue

                  url = lines[i + 1].strip()

                  title = line.upper()

                  blacklist = [
                      "MLB",
                      "CRICKET",
                      "IPL",
                      "T20",
                      "BASEBALL"
                  ]

                  if any(x in title for x in blacklist):
                      continue

                  row = re.sub(
                      r'group-title="[^"]*"',
                      'group-title="Group Alternatif HD"',
                      line
                  )

                  wc2026.append(
                      row + "\n" + url
                  )

          # ==========================
          # WRITE IPTV
          # ==========================

          text = text.rstrip()

          text += (
              "\n\n# --- BEGIN DOMS EVENT ---\n"
              + doms.strip()
              + "\n# --- END DOMS EVENT ---"
          )

          text += (
              "\n\n# --- BEGIN ALTERNATIF HD ---\n"
              + "\n\n".join(wc2026)
              + "\n# --- END ALTERNATIF HD ---\n"
          )

          IPTV.write_text(
              text,
              encoding="utf-8"
          )

          # ==========================
          # GENERATE channels.json
          # ==========================

          channels = {}

          lines = text.splitlines()

          for i, line in enumerate(lines):

              line = line.strip()

              if not line.startswith("#EXTINF"):
                  continue

              if i + 1 >= len(lines):
                  continue

              stream = lines[i + 1].strip()

              logo_match = re.search(
                  r'tvg-logo="([^"]*)"',
                  line
              )

              group_match = re.search(
                  r'group-title="([^"]*)"',
                  line
              )

              logo = (
                  logo_match.group(1)
                  if logo_match else ""
              )

              group = (
                  group_match.group(1)
                  if group_match else "Unknown"
              )

              name = line.split(",")[-1].strip()

              item = {
                  "name": name,
                  "logo": logo,
                  "stream": stream,
                  "group": group
              }

              channels.setdefault(
                  group,
                  []
              ).append(item)

          # ==========================
          # MERGE embed.json
          # ==========================

          embed_file = Path("embed.json")

          if embed_file.exists():

              print("Loading embed.json...")

              embeds = json.loads(
                  embed_file.read_text(
                      encoding="utf-8"
                  )
              )

              if not isinstance(embeds, dict):
                  raise Exception(
                      "embed.json root must be an object"
                  )

              for group, items in embeds.items():

                  channels.setdefault(
                      group,
                      []
                  )

                  existing = {
                      c["name"]
                      for c in channels[group]
                  }

                  for item in items:

                      if "name" not in item:
                          raise Exception(
                              "Embed missing name"
                          )

                      if (
                          "embed" not in item
                          and
                          "stream" not in item
                      ):
                          raise Exception(
                              f"{item['name']} missing embed/stream"
                          )

                      if item["name"] not in existing:

                          channels[group].insert(
                              0,
                              item
                          )

                          existing.add(
                              item["name"]
                          )

              print(
                  "embed.json merged successfully"
              )

          else:

              print(
                  "embed.json not found"
              )

          Path(
              "channels.json"
          ).write_text(

              json.dumps(
                  channels,
                  indent=2,
                  ensure_ascii=False
              ),

              encoding="utf-8"
          )

          print(
              "channels.json generated"
          )

          PY

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add IPtv channels.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto sync IPTV & channels.json"

          git pull --rebase origin main || true

          git push

      - name: Done
        run: |
          echo "======================================"
          echo "IPtv updated successfully"
          echo "channels.json generated"
          echo "embed.json merged"
          echo "======================================"

