name: Sync IPTV

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Sources
        run: |
          curl -fsSL "https://raw.githubusercontent.com/SHAJON-404/iptv-playlist/refs/heads/main/channel_data/all_sports_channel.json" -o sports.json || true
          curl -fsSL "https://raw.githubusercontent.com/doms9/iptv/refs/heads/default/M3U8/events.m3u8" -o events.m3u8 || true

      - name: Build IPTV
        run: |
          python3 << 'PY'
          from pathlib import Path
          import json
          import re

          iptv = Path("IPtv")

          if not iptv.exists():
              iptv.write_text("#EXTM3U\n", encoding="utf-8")

          text = iptv.read_text(
              encoding="utf-8",
              errors="ignore"
          )

          # Hapus blok lama
          blocks = [
              (
                  "# --- BEGIN DOMS EVENT ---",
                  "# --- END DOMS EVENT ---"
              ),
              (
                  "# --- BEGIN SHAJON ALTERNATIF ---",
                  "# --- END SHAJON ALTERNATIF ---"
              )
          ]

          for begin, end in blocks:
              text = re.sub(
                  rf"\n?{re.escape(begin)}.*?{re.escape(end)}",
                  "",
                  text,
                  flags=re.S
              )

          # DOMS
          doms = ""

          if Path("events.m3u8").exists():
              doms = Path(
                  "events.m3u8"
              ).read_text(
                  encoding="utf-8",
                  errors="ignore"
              )

              doms = doms.replace(
                  "#EXTM3U",
                  ""
              )

              doms = re.sub(
                  r'group-title="[^"]*"',
                  'group-title="Group Event"',
                  doms
              )

          # SHAJON
          alternatif = []

          if Path("sports.json").exists():
              try:
                  data = json.loads(
                      Path("sports.json").read_text(
                          encoding="utf-8"
                      )
                  )

                  for item in data:
                      name = str(
                          item.get("name", "")
                      ).strip()

                      url = str(
                          item.get("url", "")
                      ).strip()

                      if not name or not url:
                          continue

                      alternatif.append(
                          f'#EXTINF:-1 tvg-name="{name}" group-title="Group Alternatif",{name}\n{url}'
                      )

              except Exception as e:
                  print(e)

          text = text.rstrip()

          text += (
              "\n\n# --- BEGIN DOMS EVENT ---\n"
              + doms.strip()
              + "\n# --- END DOMS EVENT ---"
          )

          text += (
              "\n\n# --- BEGIN SHAJON ALTERNATIF ---\n"
              + "\n\n".join(alternatif)
              + "\n# --- END SHAJON ALTERNATIF ---\n"
          )

          iptv.write_text(
              text,
              encoding="utf-8"
          )
          PY

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add IPtv

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto sync IPTV"
          git push
