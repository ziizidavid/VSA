name: Sync IPTV

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SHAJON
        run: |
          curl -L \
          "https://raw.githubusercontent.com/SHAJON-404/iptv-playlist/refs/heads/main/channel_data/all_sports_channel.json" \
          -o sports.json || true

      - name: Download DOMS
        run: |
          curl -L \
          "https://raw.githubusercontent.com/doms9/iptv/refs/heads/default/M3U8/events.m3u8" \
          -o events.m3u8 || true

      - name: Build IPTV
        run: |
          python3 << 'PY'
          from pathlib import Path
          import json,re

          IPTV = Path("IPtv")

          if not IPTV.exists():
              IPTV.write_text("#EXTM3U\n", encoding="utf-8")

          text = IPTV.read_text(encoding="utf-8")

          markers = [
              ("# --- BEGIN SHAJON PERMANENT ---","# --- END SHAJON PERMANENT ---"),
              ("# --- BEGIN SHAJON LIVE ---","# --- END SHAJON LIVE ---"),
              ("# --- BEGIN DOMS EVENT ---","# --- END DOMS EVENT ---")
          ]

          for begin,end in markers:
              text = re.sub(
                  rf"\n?{re.escape(begin)}.*?{re.escape(end)}",
                  "",
                  text,
                  flags=re.S
              )

          permanent=[]
          live=[]

          if Path("sports.json").exists():
              try:
                  data=json.loads(
                      Path("sports.json").read_text(
                          encoding="utf-8"
                      )
                  )

                  seen=set()

                  for item in data:

                      name=str(
                          item.get("name","")
                      ).strip()

                      url=str(
                          item.get("url","")
                      ).strip()

                      if not name or not url:
                          continue

                      if url in seen:
                          continue

                      seen.add(url)

                      row=(
                          f'#EXTINF:-1 tvg-name="{name}" '
                          f'group-title="Group Viva",{name}\n'
                          f'{url}'
                      )

                      upper=name.upper()

                      if (
                          upper.startswith("LIVE")
                          or
                          upper.startswith("SD LIVE")
                      ):
                          live.append(row)
                      else:
                          permanent.append(row)

              except:
                  pass

          doms=""

          if Path("events.m3u8").exists():
              try:
                  doms=Path(
                      "events.m3u8"
                  ).read_text(
                      encoding="utf-8",
                      errors="ignore"
                  ).strip()
              except:
                  pass

          text=text.rstrip()

          text += "\n\n# --- BEGIN SHAJON PERMANENT ---\n"
          text += "\n\n".join(permanent)
          text += "\n# --- END SHAJON PERMANENT ---"

          text += "\n\n# --- BEGIN SHAJON LIVE ---\n"
          text += "\n\n".join(live)
          text += "\n# --- END SHAJON LIVE ---"

          text += "\n\n# --- BEGIN DOMS EVENT ---\n"
          text += doms
          text += "\n# --- END DOMS EVENT ---\n"

          IPTV.write_text(
              text,
              encoding="utf-8"
          )
          PY

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add IPtv

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Sync IPTV"
          git push
