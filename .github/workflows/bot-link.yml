name: Sync IPTV

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download DOMS
        run: |
          curl -fsSL "https://raw.githubusercontent.com/doms9/iptv/refs/heads/default/M3U8/events.m3u8" -o events.m3u8 || true

      - name: Download WORLD CUP 2026
        run: |
          curl -fsSL "https://raw.githubusercontent.com/HeruAje23/IPTV-VOUCHER/refs/heads/master/IPTV2026.m3u" -o wc2026.m3u || true

      - name: Build IPTV
        run: |
          python3 << 'PY'
          from pathlib import Path
          import re

          IPTV = Path("IPtv")

          if not IPTV.exists():
              IPTV.write_text("#EXTM3U\n", encoding="utf-8")

          text = IPTV.read_text(
              encoding="utf-8",
              errors="ignore"
          )

          # Hapus blok lama
          blocks = [
              (
                  "# --- BEGIN DOMS EVENT ---",
                  "# --- END DOMS EVENT ---"
              ),
              (
                  "# --- BEGIN WORLD CUP 2026 ---",
                  "# --- END WORLD CUP 2026 ---"
              )
          ]

          for begin, end in blocks:
              text = re.sub(
                  rf"\n?{re.escape(begin)}.*?{re.escape(end)}",
                  "",
                  text,
                  flags=re.S
              )

          # ==========================
          # DOMS
          # ==========================

          doms = ""

          if Path("events.m3u8").exists():

              try:

                  doms = Path(
                      "events.m3u8"
                  ).read_text(
                      encoding="utf-8",
                      errors="ignore"
                  )

                  doms = doms.replace(
                      "#EXTM3U",
                      ""
                  )

                  doms = re.sub(
                      r'group-title="[^"]*"',
                      'group-title="Group Event"',
                      doms
                  )

              except Exception as e:
                  print(e)

          # ==========================
          # WORLD CUP 2026
          # ==========================

          wc2026 = []

          if Path("wc2026.m3u").exists():

              try:

                  lines = Path(
                      "wc2026.m3u"
                  ).read_text(
                      encoding="utf-8",
                      errors="ignore"
                  ).splitlines()

                  inside = False

                  for i, line in enumerate(lines):

                      if "#WORLD CUP 2026#" in line.upper():
                          inside = True
                          continue

                      if inside and line.startswith("#EXTINF"):

                          if i + 1 < len(lines):

                              url = lines[i + 1].strip()

                              row = re.sub(
                                  r'group-title="[^"]*"',
                                  'group-title="Group Event"',
                                  line
                              )

                              wc2026.append(
                                  row + "\n" + url
                              )

              except Exception as e:
                  print(e)

          # ==========================
          # Tulis ulang
          # ==========================

          text = text.rstrip()

          text += (
              "\n\n# --- BEGIN DOMS EVENT ---\n"
              + doms.strip()
              + "\n# --- END DOMS EVENT ---"
          )

          text += (
              "\n\n# --- BEGIN WORLD CUP 2026 ---\n"
              + "\n\n".join(wc2026)
              + "\n# --- END WORLD CUP 2026 ---\n"
          )

          IPTV.write_text(
              text,
              encoding="utf-8"
          )

          PY

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add IPtv

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto sync IPTV"
          git push