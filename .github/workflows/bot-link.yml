name: Sync IPTV playlist (preserve up to WC2026 2; soccer-only)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-iptv
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch upstream playlist
        run: |
          set -euo pipefail

          URL="https://raw.githubusercontent.com/doms9/iptv/refs/heads/default/M3U8/events.m3u8"

          curl -fsSL "$URL" -o /tmp/events.m3u8 || {
            echo "Failed to download upstream"
            exit 0
          }

          tr -d '\r' < /tmp/events.m3u8 > /tmp/events.normalized

      - name: Replace autogenerated soccer-only block preserving header up to WC2026 2
        run: |
          python3 << 'PY'
          from pathlib import Path
          import re
          import sys

          LOCAL = Path("IPtv")
          UPSTREAM = Path("/tmp/events.normalized")

          if not UPSTREAM.exists():
              print("Missing upstream file")
              sys.exit(0)

          upstream_text = UPSTREAM.read_text(encoding="utf-8")

          entries = re.findall(
              r'(^#EXTINF[^\n]*(?:\n(?!#EXTINF).*)*)',
              upstream_text,
              flags=re.MULTILINE
          )

          if not LOCAL.exists():
              LOCAL.write_text("#EXTM3U\n\n", encoding="utf-8")

          local_text = LOCAL.read_text(encoding="utf-8")

          #
          # ANCHOR BARU
          # Playlist akan dipertahankan sampai WC2026 2
          #
          ANCHOR_URL = "https://d1211whpimeups.cloudfront.net/smil:rtbgo/playlist.m3u8"

          BEGIN = "# --- BEGIN AUTOGENERATED doms9/events.m3u8 (SOCCER ONLY) ---"
          END   = "# --- END AUTOGENERATED doms9/events.m3u8 (SOCCER ONLY) ---"

          def find_anchor_end(text, url):
              idx = text.find(url)

              if idx == -1:
                  return -1

              end = text.find("\n", idx)

              if end == -1:
                  return len(text)

              return end + 1

          anchor_pos = find_anchor_end(local_text, ANCHOR_URL)

          if anchor_pos != -1:
              header = local_text[:anchor_pos]

          elif BEGIN in local_text and END in local_text:
              header = local_text.split(BEGIN, 1)[0]

          else:
              header = local_text.rstrip() + "\n\n"

          url_re = re.compile(
              r'^\s*(https?://[^\s]+)',
              re.MULTILINE | re.IGNORECASE
          )

          header_urls = {
              m.group(1).strip()
              for m in url_re.finditer(header)
          }

          def extract_url(entry):
              for line in entry.splitlines():
                  line = line.strip()

                  if re.match(
                      r'^(https?://|//|rtmp:|rtsp:|udp:|mms:)',
                      line,
                      flags=re.IGNORECASE
                  ):
                      return line

              return None

          keywords = [
              "soccer",
              "football",
              "futbol",
              "fifa",
              "world cup",
              "worldcup",
              "wc2026",
              "fifa world cup"
          ]

          def is_soccer_entry(entry):
              text = entry.lower()

              return any(
                  keyword in text
                  for keyword in keywords
              )

          generated = []
          seen_urls = set()

          for entry in entries:

              url = extract_url(entry)

              if not url:
                  continue

              if url in header_urls:
                  continue

              if url in seen_urls:
                  continue

              if not is_soccer_entry(entry):
                  continue

              seen_urls.add(url)

              entry = re.sub(
                  r'group-title="[^"]*"',
                  'group-title="Group Event"',
                  entry
              )

              if 'group-title="' not in entry:
                  entry = entry.replace(
                      ",",
                      ' group-title="Group Event",',
                      1
                  )

              generated.append(entry.rstrip())

          block = BEGIN + "\n"

          if generated:
              block += "\n\n".join(generated)
              block += "\n"

          block += END + "\n"

          final_text = header

          if not final_text.endswith("\n"):
              final_text += "\n"

          final_text += block

          if final_text != local_text:
              LOCAL.write_text(
                  final_text,
                  encoding="utf-8"
              )

              print(
                  f"Updated with {len(generated)} soccer events"
              )

          else:
              print("No changes")
          PY

      - name: Commit and push
        run: |
          if git status --porcelain | grep -q "IPtv"; then

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add IPtv

            git commit -m "Update soccer events"

            git push

          else
            echo "No changes"
          fi
