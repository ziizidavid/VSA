name: Sync IPTV playlist (preserve up to anchor)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-iptv
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch upstream playlist
        run: |
          set -euo pipefail
          URL="https://raw.githubusercontent.com/doms9/iptv/refs/heads/default/M3U8/events.m3u8"
          curl -fsSL "$URL" -o /tmp/events.m3u8 || { echo "Failed to download upstream; exiting"; exit 0; }
          tr -d '\r' < /tmp/events.m3u8 > /tmp/events.normalized

      - name: Replace autogenerated block preserving header up to anchor (Python)
        id: sync
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re, sys

          LOCAL = Path("IPtv")
          UP = Path("/tmp/events.normalized")

          if not UP.exists():
              print("Upstream file missing; exit")
              sys.exit(0)

          up_text = UP.read_text(encoding="utf-8")

          # extract upstream entries (#EXTINF blocks)
          entries = re.findall(r'(#EXTINF[^\n]*(?:\n(?!#EXTINF).*)*)', up_text, flags=re.MULTILINE)

          # ensure local exists
          if not LOCAL.exists():
              LOCAL.write_text("#EXTM3U\n\n", encoding="utf-8")

          local_text = LOCAL.read_text(encoding="utf-8")

          # anchor URL (preserve up to and including the line containing this)
          ANCHOR = "http://103.148.44.38:8000/play/a05u/index.m3u8"

          BEGIN = "# --- BEGIN AUTOGENERATED doms9/events.m3u8 ---"
          END   = "# --- END AUTOGENERATED doms9/events.m3u8 ---"

          def first_line_index_containing(text, needle):
              # return index AFTER the line that contains needle, or -1 if not found
              idx = text.find(needle)
              if idx == -1:
                  return -1
              # find start of line
              start = text.rfind('\n', 0, idx)
              if start == -1:
                  start = 0
              else:
                  start += 1
              # find end of that line
              end = text.find('\n', idx)
              if end == -1:
                  end = len(text)
              else:
                  end = end + 1
              return end

          header = None
          anchor_pos = first_line_index_containing(local_text, ANCHOR)
          if anchor_pos != -1:
              header = local_text[:anchor_pos]
          elif BEGIN in local_text and END in local_text:
              header = local_text.split(BEGIN, 1)[0]
          else:
              # preserve whole current file as header (so awal tidak diubah)
              header = local_text.rstrip() + "\n\n"

          # collect URLs already present in header to avoid duplicates
          url_re = re.compile(r'^\s*(https?://[^\s]+)', re.IGNORECASE | re.MULTILINE)
          header_urls = set(m.group(1).strip() for m in url_re.finditer(header))

          def extract_url(entry_text):
              for line in entry_text.splitlines():
                  s = line.strip()
                  if re.match(r'^(https?://|//|rtmp:|rtsp:|udp:|mms:)', s, flags=re.IGNORECASE):
                      return s
              return None

          # build new block from upstream entries, skipping ones whose URL is in header_urls
          new_entries = []
          seen_urls = set()
          for e in entries:
              url = extract_url(e)
              if not url:
                  continue
              if url in header_urls:
                  continue
              if url in seen_urls:
                  continue
              seen_urls.add(url)
              new_entries.append(e.rstrip() + "\n")

          # compose final text: header + BEGIN block + END
          block = BEGIN + "\n"
          if new_entries:
              block += "\n".join(new_entries).rstrip() + "\n"
          block += END + "\n"

          final = header
          if not final.endswith("\n"):
              final += "\n"
          final += block

          # write only if changed
          if final != local_text:
              LOCAL.write_text(final, encoding="utf-8")
              print(f"updated: wrote {len(new_entries)} upstream entries into autogenerated block")
              print("CHANGED=1")
              sys.exit(0)
          else:
              print("No change; upstream block identical")
              sys.exit(0)
          PY

      - name: Commit & push if changed
        run: |
          set -e
          if git status --porcelain | grep -q "IPtv"; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add IPtv
            git commit -m "Automated sync: update autogenerated block from doms9/events.m3u8"
            git push
            echo "Pushed changes"
          else
            echo "No changes to commit"
          fi
