name: Sync IPTV
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -fsSL https://raw.githubusercontent.com/SHAJON-404/iptv-playlist/refs/heads/main/channel_data/all_sports_channel.json -o sports.json || exit 0
          python3 << 'PY'
          from pathlib import Path
          import json,re
          p=Path('IPtv')
          txt=p.read_text(encoding='utf-8') if p.exists() else '#EXTM3U\n'
          data=json.loads(Path('sports.json').read_text(encoding='utf-8'))

          B1='# --- BEGIN SHAJON PERMANENT ---'
          E1='# --- END SHAJON PERMANENT ---'
          B2='# --- BEGIN SHAJON LIVE ---'
          E2='# --- END SHAJON LIVE ---'

          base=txt
          for a,b in [(B1,E1),(B2,E2)]:
            if a in base and b in base:
              s=base.index(a)
              e=base.index(b)+len(b)
              base=base[:s].rstrip()+'\n'

          perm=[]; live=[]
          for item in data:
            name=str(item.get('name','')).strip()
            url=item.get('url')
            if not name or not url: continue
            row=f'#EXTINF:-1 group-title="Group Viva",{name}\n{url}'
            upper=name.upper()
            if 'LIVE' in upper and not any(x in upper for x in ['FOX','BEIN','FIFA']):
              live.append(row)
            else:
              perm.append(row)

          newtxt=base.rstrip()+'\n\n'+B1+'\n'+('\n\n'.join(perm))+'\n'+E1+'\n\n'+B2+'\n'+('\n\n'.join(live))+'\n'+E2+'\n'
          if newtxt!=txt:
            p.write_text(newtxt,encoding='utf-8')
          PY
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add IPtv
          git commit -m 'Sync SHAJON channels'
          git push